version: "3.8"

# Production-like Vault setup with file storage backend
# For dev/quick-start use docker-compose.dev.yml instead

services:
  vault:
    image: hashicorp/vault:1.15.6
    container_name: vault-poc
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - vault-data:/vault/data
      - vault-logs:/vault/logs
    command: server
    healthcheck:
      test:
        [
          "CMD",
          "vault",
          "status",
          "-address=http://127.0.0.1:8200",
          "-format=json",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  vault-data:
    driver: local
  vault-logs:
    driver: local
