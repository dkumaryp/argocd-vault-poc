# ArgoCD Application: deploys the demo-app from this Git repository.
# The application uses the argocd-vault-plugin CMP to inject secrets
# from Vault before applying manifests to the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-secret-app
  namespace: argocd
  # Finalizer ensures the app and its resources are cleaned up on deletion
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Update this URL to your actual Git repo containing the demo-app manifests
    repoURL: https://github.com/YOUR_ORG/YOUR_REPO.git
    targetRevision: HEAD
    path: argocd-vault-poc/demo-app

    # Use the AVP Config Management Plugin
    plugin:
      name: argocd-vault-plugin

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
