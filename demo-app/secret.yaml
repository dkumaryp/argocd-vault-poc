# AVP Annotation-style Secret
# ─────────────────────────────────────────────────────────────────────────────
# The annotation avp.kubernetes.io/path tells AVP which Vault path to read.
# Placeholders like <username> are replaced with values from that path at
# sync time. The actual secret values NEVER exist in Git.
#
# Vault path: secrets/data/demo-app
# Keys stored: username, password, api-key, db-host, db-name
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
  namespace: demo
  annotations:
    # AVP reads from this Vault KV v2 path
    avp.kubernetes.io/path: "secrets/data/demo-app"
type: Opaque
stringData:
  # These <placeholders> are replaced by AVP with real Vault values at deploy time
  username: <username>
  password: <password>
  api-key: <api-key>
  db-host: <db-host>
  db-name: <db-name>
---
# Inline-style alternative (no annotation needed — path is embedded)
# Uncomment and use instead if you prefer inline path notation.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: demo-secret-inline
#   namespace: demo
# type: Opaque
# stringData:
#   username: <path:secrets/data/demo-app#username>
#   password: <path:secrets/data/demo-app#password>
#   api-key: <path:secrets/data/demo-app#api-key>
