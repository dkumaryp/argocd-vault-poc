apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          # Inject secrets from the Kubernetes Secret (populated by AVP)
          env:
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: password
            - name: APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: api-key
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: db-host
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
